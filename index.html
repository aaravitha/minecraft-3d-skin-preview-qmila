<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Minecraft 3D Skin Viewer</title>
    <style>
      :root{--bg:#0b1020;--panel:#0f1730;--text:#e8efff;--muted:#a8b4d6}
      html,body{height:100%}
      body{
        margin:0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
        background: radial-gradient(1200px 800px at 20% 0%, #121e3f, var(--bg));
        color:var(--text);
        overflow:hidden;
      }
      header{
        display:flex;align-items:center;justify-content:space-between;gap:12px;
        padding:12px 16px;border-bottom:1px solid rgba(255,255,255,.08);
        background: rgba(15,23,48,.6); backdrop-filter: blur(10px);
        position:sticky;top:0;z-index:5;
      }
      header .title{display:flex;flex-direction:column;gap:2px}
      header .title strong{font-size:14px;letter-spacing:.2px}
      header .title small, header .right small{color:var(--muted)}
      main{
        height:calc(100vh - 62px);
        display:grid;
        grid-template-columns:380px minmax(0,1fr);
        gap:12px;padding:12px;box-sizing:border-box;
        overflow:hidden;
      }
      .panel{
        border:1px solid rgba(255,255,255,.08);
        background: rgba(15,23,48,.65);
        border-radius:14px;padding:12px;box-sizing:border-box;
        box-shadow:0 10px 30px rgba(0,0,0,.25);
        min-height:0;
      }
      .panel.controls{overflow:auto}
      .panel h3{margin:0 0 8px;font-size:13px;color:var(--muted);font-weight:600}
      label{display:block;font-size:12px;color:var(--muted);margin:10px 0 6px}
      input,select,button{
        width:100%;box-sizing:border-box;
        border:1px solid rgba(255,255,255,.10);
        background: rgba(11,16,32,.75);
        color:var(--text);
        padding:10px;border-radius:12px;outline:none;
      }

      /* Button hover effect */
      button{
        cursor:pointer;
        transition:
          transform .12s ease,
          border-color .12s ease,
          background-color .12s ease,
          box-shadow .12s ease,
          filter .12s ease;
      }
      button:hover{
        border-color: rgba(122,167,255,.70);
        background: rgba(22,34,68,.85);
        box-shadow: 0 10px 22px rgba(0,0,0,.28);
        filter: brightness(1.05);
        transform: translateY(-1px);
      }
      button:active{
        transform: translateY(0px) scale(0.99);
        box-shadow: 0 6px 14px rgba(0,0,0,.22);
      }
      button:focus-visible{
        outline: none;
        box-shadow: 0 0 0 3px rgba(122,167,255,.20), 0 10px 22px rgba(0,0,0,.28);
        border-color: rgba(122,167,255,.80);
      }

      /* "Danger" button style for clear skins */
      button.danger{
        border-color: rgba(255,255,255,.12);
        background: rgba(40, 10, 18, .65);
      }
      button.danger:hover{
        border-color: rgba(255, 110, 140, .70);
        background: rgba(70, 18, 32, .85);
        box-shadow: 0 10px 22px rgba(0,0,0,.28);
      }

      .row{display:flex;gap:10px}.row>*{flex:1}
      .toggleRow{display:flex;align-items:center;gap:10px;margin-top:10px}
      .toggleRow input{width:auto}
      .btnRow{display:flex;gap:10px;margin-top:10px}.btnRow>button{flex:1}
      #viewerWrap{height:100%;padding:12px;min-height:0}
      #skin_container{
        height:100%;width:100%;min-height:0;border-radius:14px;overflow:hidden;
        background: rgba(11,16,32,.75);
        position:relative;border:1px solid rgba(255,255,255,.08);
      }
      #status{
        position:absolute;left:12px;bottom:12px;
        padding:8px 10px;border-radius:12px;
        background: rgba(15,23,48,.75);
        border:1px solid rgba(255,255,255,.10);
        color:var(--muted);font-size:12px;max-width:70%;
        pointer-events:none;
      }
      #credits{
        position:absolute;right:12px;bottom:12px;
        padding:8px 10px;border-radius:12px;
        background: rgba(15,23,48,.75);
        border:1px solid rgba(255,255,255,.10);
        color:var(--muted);font-size:12px;max-width:70%;
        pointer-events:none;text-align:right;
      }
      .thumb{border:1px solid rgba(255,255,255,.12);border-radius:12px;overflow:hidden;cursor:pointer;background: rgba(11,16,32,.75)}
      .thumb.selected{outline:2px solid rgba(122,167,255,.85)}
      .thumb img{display:block;width:100%;height:auto;image-rendering:pixelated}
      #bulkGrid{max-height:260px;overflow:auto;display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
      #bulkStatus{display:block;margin-top:6px;color:var(--muted);font-size:12px}
      .hint{margin-top:10px;color:var(--muted);font-size:12px;line-height:1.4}
    </style>
  </head>
  <body>
    <header>
      <div class="title">
        <strong>Minecraft 3D Skin Viewer</strong>
        <small>Classic/Slim • Bulk tester • Outer layer toggle • Screenshot</small>
      </div>
      <div class="right">
        <small>Keys: ←/→ to switch bulk skins</small>
      </div>
    </header>

    <main>
      <section class="panel controls">
        <h3>Inputs</h3>

        <label>Single skin (PNG)</label>
        <input id="skinFile" type="file" accept="image/png" />

        <label>Bulk skins (many PNGs)</label>
        <input id="bulkFiles" type="file" accept="image/png" multiple />

        <div class="row">
          <div>
            <label>Body model</label>
            <select id="modelType">
              <option value="default" selected>Classic (default)</option>
              <option value="slim">Slim</option>
            </select>
          </div>
          <div>
            <label>Animation</label>
            <select id="animation">
              <option value="idle" selected>Idle</option>
              <option value="walk">Walk</option>
            </select>
          </div>
        </div>

        <div class="row">
          <div>
            <label>Speed</label>
            <input id="speed" type="range" min="0" max="2.5" step="0.05" value="1" />
          </div>
          <div>
            <label>Zoom (FOV)</label>
            <input id="zoom" type="range" min="20" max="90" step="1" value="45" />
          </div>
        </div>

        <div class="toggleRow">
          <input id="outerLayerToggle" type="checkbox" checked />
          <label for="outerLayerToggle" style="margin:0;color:var(--text);">3D Layers (Outer Layer)</label>
        </div>

        <div class="toggleRow">
          <input id="autoRotate" type="checkbox" checked />
          <label for="autoRotate" style="margin:0;color:var(--text);">Auto rotate</label>
        </div>

        <div class="row">
          <div>
            <label>Auto-advance (sec)</label>
            <input id="autoAdvanceSec" type="number" min="0" step="0.5" value="0" />
          </div>
          <div>
            <label>Background</label>
            <input id="bgColor" type="color" value="#0b1020" />
          </div>
        </div>

        <div class="btnRow">
          <button id="playPauseBtn" type="button">Pause animation</button>
          <button id="screenshotBtn" type="button">Screenshot</button>
        </div>

        <div class="btnRow">
          <button id="resetPoseBtn" type="button">Reset pose</button>
          <button id="resetBtn" type="button">Reset camera</button>
        </div>

        <div class="btnRow">
          <button id="prevSkin" type="button">Prev</button>
          <button id="nextSkin" type="button">Next</button>
        </div>

        <!-- Added: Clear skins option -->
        <div class="btnRow">
          <button id="clearSkinsBtn" class="danger" type="button">Clear skins</button>
        </div>

        <label>Bulk list</label>
        <div id="bulkGrid"></div>
        <small id="bulkStatus"></small>

        <div class="hint">Outer layer OFF = “2D-style” (no hat/jacket overlays).</div>
      </section>

      <section class="panel" id="viewerWrap">
        <div id="skin_container">
          <div id="status">Loading viewer…</div>
          <div id="credits">Discord: nq9x • Minecraft IGN: qMila</div>
        </div>
      </section>
    </main>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
